<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenteken Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD700;
      --yellow-dark: #e6c200;
      --black: #0a0a0a;
      --dark: #111111;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #FFD700;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      padding: 2rem 2rem 0;
      display: flex;
      justify-content: center;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--yellow);
    }

    /* Hero */
    .hero {
      margin-top: 5vh;
      text-align: center;
      padding: 0 1rem;
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .hero h1 span {
      color: var(--yellow);
    }

    .hero p {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    /* License plate input */
    .plate-wrapper {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 0 1rem;
    }

    .plate-input-container {
      display: flex;
      align-items: center;
      background: var(--yellow);
      border-radius: 8px;
      padding: 6px 6px 6px 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 0 4px rgba(255,215,0,0.15), 0 8px 40px rgba(255,215,0,0.1);
      gap: 8px;
    }

    /* Blue strip like real NL plate */
    .plate-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #003DA5;
      border-radius: 4px;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .plate-strip .eu-stars {
      font-size: 7px;
      letter-spacing: 1px;
      color: var(--yellow);
      line-height: 1;
    }

    .plate-strip .nl-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 11px;
      color: white;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    #plate-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      width: 100%;
      caret-color: var(--black);
    }

    #plate-input::placeholder {
      color: rgba(0,0,0,0.3);
    }

    .search-btn {
      background: var(--black);
      color: var(--yellow);
      border: none;
      border-radius: 6px;
      padding: 0.85rem 1.4rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .search-btn:hover { background: #222; }
    .search-btn:active { transform: scale(0.97); }

    /* Loading */
    .loading {
      display: none;
      margin-top: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      display: none;
      margin-top: 1.5rem;
      color: #ff6b6b;
      font-size: 0.9rem;
      text-align: center;
    }

    /* Results */
    #results {
      display: none;
      width: 100%;
      max-width: 860px;
      padding: 2rem 1rem 4rem;
      margin-top: 1rem;
    }

    /* Big plate display */
    .result-plate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .big-plate {
      background: var(--yellow);
      border-radius: 10px;
      padding: 10px 24px 10px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 30px rgba(255,215,0,0.2);
    }

    .big-plate-strip {
      background: #003DA5;
      border-radius: 6px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .big-plate-strip .stars { font-size: 9px; color: var(--yellow); letter-spacing: 2px; }
    .big-plate-strip .nl { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 14px; color: white; letter-spacing: 0.1em; }

    .big-plate-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 3rem;
      letter-spacing: 0.12em;
      color: var(--black);
    }

    .result-meta {
      text-align: center;
    }

    .result-meta .car-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-meta .car-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }

    /* APK badge */
    .apk-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.5rem;
    }

    .apk-valid { background: rgba(80,200,120,0.15); color: #50c878; border: 1px solid rgba(80,200,120,0.3); }
    .apk-warning { background: rgba(255,165,0,0.15); color: orange; border: 1px solid rgba(255,165,0,0.3); }
    .apk-expired { background: rgba(255,80,80,0.15); color: #ff5050; border: 1px solid rgba(255,80,80,0.3); }

    /* Section */
    .section {
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* Grid of data fields */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .data-field {
      background: var(--card);
      padding: 0.8rem 1rem;
    }

    .data-field .label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .data-field .value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .data-field .value.highlight {
      color: var(--yellow);
      font-weight: 600;
    }

    /* Recall banner */
    .recall-banner {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .recall-icon { font-size: 1.4rem; }
    .recall-text { font-size: 0.9rem; color: #ff8080; }
    .recall-text strong { display: block; color: #ff5050; }

    /* Footer */
    footer {
      margin-top: auto;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    footer a { color: var(--muted); }

    @media (max-width: 500px) {
      .data-grid { grid-template-columns: 1fr 1fr; }
      .big-plate-number { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">&#9632; Kenteken Check</div>
</header>

<div class="hero">
  <h1>Kenteken<br/><span>Check</span></h1>
  <p>Voertuiggegevens direct uit het RDW register</p>
</div>

<div class="plate-wrapper">
  <div class="plate-input-container">
    <div class="plate-strip">
      <div class="eu-stars">★ ★ ★</div>
      <div class="nl-text">NL</div>
    </div>
    <input id="plate-input" type="text" placeholder="XX-XX-XX" maxlength="9" autocomplete="off" spellcheck="false" />
    <button class="search-btn" onclick="lookup()">Zoek</button>
  </div>

  <div class="loading" id="loading">
    <span class="spinner"></span> Gegevens ophalen...
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<div id="results"></div>

<footer>
  Gegevens afkomstig van <a href="https://opendata.rdw.nl" target="_blank">RDW Open Data</a>
</footer>

<script>
  const input = document.getElementById('plate-input')

  // Dutch plate formats for auto-formatting
  const FORMATS = [
    /^([A-Z]{2})(\d{2})(\d{2})$/,           // XX-99-99
    /^(\d{2})(\d{2})([A-Z]{2})$/,           // 99-99-XX
    /^(\d{2})([A-Z]{2})(\d{2})$/,           // 99-XX-99
    /^([A-Z]{2})(\d{2})([A-Z]{2})$/,        // XX-99-XX
    /^([A-Z]{2})([A-Z]{2})(\d{2})$/,        // XX-XX-99
    /^(\d{2})([A-Z]{2})([A-Z]{2})$/,        // 99-XX-XX
    /^(\d{3})([A-Z]{2})(\d{1})$/,           // 999-XX-9
    /^(\d{1})([A-Z]{2})(\d{3})$/,           // 9-XX-999
    /^([A-Z]{2})(\d{3})([A-Z]{1})$/,        // XX-999-X
    /^([A-Z]{1})(\d{3})([A-Z]{2})$/,        // X-999-XX
    /^([A-Z]{3})(\d{2})([A-Z]{1})$/,        // XXX-99-X
    /^([A-Z]{1})(\d{2})([A-Z]{3})$/,        // X-99-XXX
  ]

  function formatPlate(raw) {
    const clean = raw.toUpperCase().replace(/-/g, '').replace(/\s/g, '')
    for (const fmt of FORMATS) {
      const m = clean.match(fmt)
      if (m) return `${m[1]}-${m[2]}-${m[3]}`
    }
    return clean
  }

  function normalizePlate(raw) {
    return raw.toUpperCase().replace(/-/g, '').replace(/\s/g, '')
  }

  function formatDate(str) {
    if (!str) return '–'
    if (str.includes('T')) str = str.split('T')[0]
    if (str.length === 8) {
      return `${str.slice(6,8)}-${str.slice(4,6)}-${str.slice(0,4)}`
    }
    const d = new Date(str)
    if (isNaN(d)) return str
    return d.toLocaleDateString('nl-NL')
  }

  function apkStatus(dateStr) {
    if (!dateStr) return null
    let d
    if (dateStr.length === 8) {
      d = new Date(`${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`)
    } else {
      d = new Date(dateStr)
    }
    const now = new Date()
    const diff = (d - now) / (1000 * 60 * 60 * 24)
    if (diff < 0) return { cls: 'apk-expired', label: `Verlopen op ${formatDate(dateStr)}` }
    if (diff < 60) return { cls: 'apk-warning', label: `Verloopt ${formatDate(dateStr)} (${Math.round(diff)} dagen)` }
    return { cls: 'apk-valid', label: `Geldig tot ${formatDate(dateStr)}` }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup()
  })

  input.addEventListener('input', () => {
    const raw = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '')
    input.value = input.value.toUpperCase()
  })

  function fetchCarImage(brand, model) {
    const imageEl = document.getElementById('car-image')
    const loadingEl = document.getElementById('image-loading')
    
    let imageUrl = null
    
    // Search query is brand + model
    let searchQuery = (model).trim()
    
    // Try multiple sources in order (Wikipedia first)
    const tryNextSource = async () => {
      // Source 1: Wikipedia API (has great car images)
      try {
        const response = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchQuery)}&format=json&origin=*&srlimit=1`)
        if (response.ok) {
          const data = await response.json()
          if (data.query && data.query.search && data.query.search.length > 0) {
            const title = data.query.search[0].title
            // Get the page image
            const imageResponse = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages|pageterms&pithumbsize=500&format=json&origin=*`)
            if (imageResponse.ok) {
              const imgData = await imageResponse.json()
              for (let pageId in imgData.query.pages) {
                if (imgData.query.pages[pageId].thumbnail) {
                  imageUrl = imgData.query.pages[pageId].thumbnail.source
                  return true
                }
              }
            }
          }
        }
      } catch(e) {}
      
      // Fallback to mystery car image
      imageUrl = 'https://images.unsplash.com/photo-1533473359331-35acde7260c9?q=80&w=400&auto=format&fit=crop'
      return true
    }
    
    // Execute the search
    tryNextSource().then(() => {
      if (imageUrl) {
        imageEl.src = imageUrl
        
        imageEl.onload = () => {
          loadingEl.style.display = 'none'
          imageEl.style.display = 'block'
        }
        
        imageEl.onerror = () => {
          // If this image fails, try the mystery fallback
          imageEl.src = 'https://images.unsplash.com/photo-1533473359331-35acde7260c9?q=80&w=400&auto=format&fit=crop'
          imageEl.onload = () => {
            loadingEl.style.display = 'none'
            imageEl.style.display = 'block'
          }
          imageEl.onerror = null
        }
      }
    })
  }

  async function lookup() {
    const raw = normalizePlate(input.value)
    if (raw.length < 4) return

    // Format the input nicely
    input.value = formatPlate(raw)

    document.getElementById('loading').style.display = 'block'
    document.getElementById('error-msg').style.display = 'none'
    document.getElementById('results').style.display = 'none'

    try {
      const [voertuigRes, keuringenRes, terugroepRes] = await Promise.all([
        fetch(`https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken=${raw}`),
        fetch(`https://opendata.rdw.nl/resource/vkij-7mwc.json?kenteken=${raw}&$limit=10&$order=meld_datum_door_keuringsinstantie_dt%20DESC`),
        fetch(`https://opendata.rdw.nl/resource/j9yg-7rg9.json?kenteken=${raw}`),
      ])

      const [voertuig, keuringen, terugroep] = await Promise.all([
        voertuigRes.json(),
        keuringenRes.json(),
        terugroepRes.json(),
      ])

      document.getElementById('loading').style.display = 'none'

      if (!voertuig || voertuig.length === 0) {
        const err = document.getElementById('error-msg')
        err.textContent = 'Geen voertuig gevonden voor dit kenteken.'
        err.style.display = 'block'
        return
      }

      renderResults(voertuig[0], keuringen, terugroep)

    } catch (e) {
      document.getElementById('loading').style.display = 'none'
      const err = document.getElementById('error-msg')
      err.textContent = 'Er ging iets mis. Probeer het opnieuw.'
      err.style.display = 'block'
    }
  }

  function field(label, value, highlight = false) {
    if (!value || value === 'Niet geregistreerd' || value === '') return ''
    return `
      <div class="data-field">
        <div class="label">${label}</div>
        <div class="value${highlight ? ' highlight' : ''}">${value}</div>
      </div>`
  }

  function renderResults(v, keuringen, terugroep) {
    const plate = formatPlate(v.kenteken || '')
    const apk = apkStatus(v.vervaldatum_apk)
    const hasRecall = v.openstaande_terugroepactie_indicator === 'Ja'
    const modelName = `${v.merk || ''} ${v.handelsbenaming || ''}`.trim()

    let html = `
      <div style="text-align: center; margin-bottom: 2rem;">
        <div class="car-name" style="margin-bottom: 0.5rem;">${modelName}</div>
        <div style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem;">${v.voertuigsoort || ''} · ${v.inrichting || ''} · ${v.eerste_kleur || ''}</div>
        ${apk ? `<div class="apk-badge ${apk.cls}">⬥ APK: ${apk.label}</div>` : ''}
      </div>
      
      <div style="display: flex; gap: 2rem; margin-bottom: 2rem; align-items: flex-start;">
        <div style="flex: 1; min-width: 250px;">
          <div style="text-align: center; position: relative; width: 100%; height: 350px;">
            <img id="car-image" src="" alt="Car image" style="max-width: 100%; max-height: 100%; border-radius: 8px; display: none;" />
            <div id="image-loading" style="color: var(--muted); font-size: 0.9rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">Afbeelding laden...</div>
          </div>
        </div>
        
        <div style="flex: 0 0 auto; width: 280px;">
          <div style="background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem;">
            <div style="font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--yellow); margin-bottom: 1rem;">Basis Informatie</div>`
    
    html += `<div style="display: grid; gap: 1rem;">`
    html += `<div><div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem;">Merk</div><div style="font-size: 0.95rem; color: var(--text);">${v.merk || '–'}</div></div>`
    html += `<div><div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem;">Model</div><div style="font-size: 0.95rem; color: var(--text);">${v.handelsbenaming || '–'}</div></div>`
    html += `<div><div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem;">Type</div><div style="font-size: 0.95rem; color: var(--text);">${v.type || '–'}</div></div>`
    html += `<div><div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem;">Eerste Kleur</div><div style="font-size: 0.95rem; color: var(--text);">${v.eerste_kleur || '–'}</div></div>`
    html += `<div><div style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem;">Eerste Toelating</div><div style="font-size: 0.95rem; color: var(--text);">${formatDate(v.datum_eerste_toelating)}</div></div>`
    html += `</div></div></div></div>`

    // Recall warning
    if (hasRecall) {
      html += `
        <div class="recall-banner">
          <div class="recall-icon">⚠️</div>
          <div class="recall-text">
            <strong>Openstaande terugroepactie</strong>
            Dit voertuig heeft een openstaande terugroepactie. Neem contact op met de dealer.
          </div>
        </div>`
    }

    // Detailed technical info
    html += `<div class="section"><div class="section-title">Technisch</div><div class="data-grid">`
    html += field('Cilinderinhoud', v.cilinderinhoud ? `${v.cilinderinhoud} cc` : null)
    html += field('Aantal cilinders', v.aantal_cilinders)
    html += field('Vermogen/massa', v.vermogen_massarijklaar ? `${v.vermogen_massarijklaar} kW/kg` : null)
    html += field('Wielbasis', v.wielbasis ? `${v.wielbasis} cm` : null)
    html += field('Lengte', v.lengte ? `${v.lengte} cm` : null)
    html += field('Breedte', v.breedte ? `${v.breedte} cm` : null)
    html += field('Massa ledig', v.massa_ledig_voertuig ? `${v.massa_ledig_voertuig} kg` : null)
    html += field('Massa rijklaar', v.massa_rijklaar ? `${v.massa_rijklaar} kg` : null)
    html += field('Max massa voertuig', v.toegestane_maximum_massa_voertuig ? `${v.toegestane_maximum_massa_voertuig} kg` : null)
    html += field('Max trekken geremd', v.maximum_trekken_massa_geremd ? `${v.maximum_trekken_massa_geremd} kg` : null)
    html += field('Max trekken ongeremd', v.maximum_massa_trekken_ongeremd ? `${v.maximum_massa_trekken_ongeremd} kg` : null)
    html += field('Typegoedkeuringsnummer', v.typegoedkeuringsnummer)
    html += field('Chassisnummer locatie', v.plaats_chassisnummer)
    html += `</div></div>`

    // Financial
    if (v.catalogusprijs || v.bruto_bpm) {
      html += `<div class="section"><div class="section-title">Financieel</div><div class="data-grid">`
      html += field('Catalogusprijs', v.catalogusprijs ? `€ ${parseInt(v.catalogusprijs).toLocaleString('nl-NL')}` : null)
      html += field('Bruto BPM', v.bruto_bpm ? `€ ${parseInt(v.bruto_bpm).toLocaleString('nl-NL')}` : null)
      html += field('Zuinigheidsclassificatie', v.zuinigheidsclassificatie)
      html += `</div></div>`
    }

    // Tellerstand
    if (v.tellerstandoordeel) {
      html += `<div class="section"><div class="section-title">Tellerstand</div><div class="data-grid">`
      html += field('Oordeel', v.tellerstandoordeel, v.tellerstandoordeel === 'Logisch')
      html += field('Jaar laatste registratie', v.jaar_laatste_registratie_tellerstand)
      html += `</div></div>`
    }

    // Keuringen
    if (keuringen && keuringen.length > 0) {
      html += `<div class="section"><div class="section-title">Keuringen (${keuringen.length})</div><div class="data-grid">`
      keuringen.forEach(k => {
        html += field('Datum', formatDate(k.meld_datum_door_keuringsinstantie_dt || k.meld_datum_door_keuringsinstantie))
        html += field('Soort', k.soort_erkenning_omschrijving || k.soort_erkenning)
        html += field('Resultaat', k.eindoordeel || '–')
      })
      html += `</div></div>`
    }

    const el = document.getElementById('results')
    el.innerHTML = html
    el.style.display = 'block'
    el.scrollIntoView({ behavior: 'smooth', block: 'start' })
    
    // Fetch car image after DOM is ready
    fetchCarImage(v.merk, v.handelsbenaming)
  }
</script>
</body>
</html>
